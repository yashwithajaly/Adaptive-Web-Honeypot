<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Settings</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
font-family:'Poppins',sans-serif;
}

body{
background:
linear-gradient(rgba(10,25,50,0.85), rgba(10,25,50,0.90)),
url("https://images.unsplash.com/photo-1556740758-90de374c12ad?auto=format&fit=crop&w=1600&q=80");
background-size:cover;
background-position:center;
background-attachment:fixed;
min-height:100vh;
}

.navbar-custom{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
}

.glass-box{
background:rgba(255,255,255,0.12);
backdrop-filter:blur(15px);
border-radius:20px;
padding:40px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
color:white;
}

.form-control{
background:rgba(255,255,255,0.15);
border:none;
color:white;
}

.form-control:focus{
background:rgba(255,255,255,0.20);
color:white;
box-shadow:none;
}

.service-card{
display:block;
background:rgba(255,255,255,0.15);
padding:18px;
border-radius:15px;
color:white;
text-decoration:none;
transition:0.3s;
}

.service-card:hover{
background:rgba(255,255,255,0.25);
transform:translateY(-3px);
color:white;
}

.section-title{
font-weight:700;
margin-bottom:20px;
}
</style>

</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
<div class="container">
<a class="navbar-brand fw-bold">
<i class="bi bi-bank2"></i> Secure Bank
</a>

<div class="ms-auto">
<a href="{% url 'bank_dashboard' %}" class="btn btn-sm btn-light me-2">Dashboard</a>
<a href="{% url 'logout_view' %}" class="btn btn-sm btn-danger">Logout</a>
</div>
</div>
</nav>

<div class="container mt-5">

<div class="glass-box">

<h3 class="mb-4">
<i class="bi bi-person-gear"></i> Profile Settings
</h3>

<form method="post">
{% csrf_token %}

<div class="row g-3">

<div class="col-md-6">
<label>Full Name</label>
<input type="text" name="full_name" value="{{profile.full_name}}" class="form-control">
</div>

<div class="col-md-6">
<label>Email</label>
<input type="text" name="email" value="{{profile.email}}" class="form-control">
</div>

<div class="col-md-6">
<label>Phone</label>
<input type="text" name="phone" value="{{profile.phone}}" class="form-control">
</div>

<div class="col-md-6">
<label>Address</label>
<input type="text" name="address" value="{{profile.address}}" class="form-control">
</div>

</div>

<div class="mt-4">
<button class="btn btn-success px-4">
<i class="bi bi-check-circle"></i> Update Profile
</button>
</div>

</form>

{% if message %}
<div class="alert alert-info mt-4">
{{message}}
</div>
{% endif %}

<hr class="my-4">

<h5 class="section-title">
<i class="bi bi-grid-fill"></i> Banking Services
</h5>

<div class="row g-3">

<div class="col-md-4">
<a href="{% url 'account_summary' %}" class="service-card">
Account Summary
</a>
</div>

<div class="col-md-4">
<a href="{% url 'transfer_money' %}" class="service-card">
Transfer Money
</a>
</div>

<div class="col-md-4">
<a href="{% url 'transaction_history' %}" class="service-card">
Transaction History
</a>
</div>

<div class="col-md-4">
<a href="{% url 'beneficiary_page' %}" class="service-card">
Beneficiary
</a>
</div>

<div class="col-md-4">
<a href="{% url 'card_services' %}" class="service-card">
Card Services
</a>
</div>

<div class="col-md-4">
<a href="{% url 'loan_offers' %}" class="service-card">
Loan Offers
</a>
</div>

<div class="col-md-4">
<a href="{% url 'profile_settings' %}" class="service-card">
Profile Settings
</a>
</div>

</div>

<hr class="my-4">

<div class="text-center">
<a href="{% url 'bank_dashboard' %}" class="btn btn-primary px-4">
<i class="bi bi-arrow-left"></i> Back to Dashboard
</a>
</div>

</div>
</div>

</body>
</html>
