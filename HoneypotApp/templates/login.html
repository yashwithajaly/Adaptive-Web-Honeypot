{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Login</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.85)),
                  url("{% static 'images/bg.jpg' %}") no-repeat center center/cover;
      color:#fff;
    }

    .login-box{
      width:350px;
      padding:40px;
      border-radius:12px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(10px);
      border:1px solid rgba(255,255,255,0.15);
      box-shadow:0 0 30px rgba(0,0,0,0.6);
    }

    h2{
      text-align:center;
      margin-bottom:25px;
      color:#00e5ff;
      text-shadow:0 0 10px #00e5ff;
    }

    label{
      font-size:14px;
      color:#ccc;
    }

    input{
      width:100%;
      padding:10px;
      margin-top:6px;
      margin-bottom:18px;
      border-radius:6px;
      border:1px solid rgba(255,255,255,0.25);
      background: rgba(0,0,0,0.4);
      color:#fff;
      outline:none;
    }

    input:focus{
      border-color:#00e5ff;
      box-shadow:0 0 8px #00e5ff;
    }

    button{
      width:100%;
      padding:12px;
      border:none;
      border-radius:6px;
      background:#00e5ff;
      color:#000;
      font-weight:600;
      cursor:pointer;
      transition:0.3s ease;
    }

    button:hover{
      background:#00c8e0;
      box-shadow:0 0 15px #00e5ff;
    }

    .message{
      margin-top:15px;
      text-align:center;
      color:#ff4d4d;
      font-size:14px;
    }

    .back{
      display:block;
      text-align:center;
      margin-top:20px;
      text-decoration:none;
      color:#aaa;
      font-size:13px;
    }

    .back:hover{
      color:#00e5ff;
    }

  </style>
</head>
<body>

  <div class="login-box">
    <h2>User Login</h2>

    <form method="post">
      {% csrf_token %}
      <label>Username</label>
      <input type="text" name="username" placeholder="Enter username" required>

      <label>Password</label>
      <input type="password" name="password" placeholder="Enter password" required>

      <button type="submit">Login</button>
    </form>

    <div class="message">{{ message }}</div>

    <a href="{% url 'home' %}" class="back">← Back to Home</a>
    <a href="{% url 'fake_admin_login' %}"class = "back">Admin Login</a>
  </div>

</body>
</html>
